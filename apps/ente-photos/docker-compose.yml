x-runtipi:
  schema_version: 2
services:
  caddy:
    image: ghcr.io/coreruleset/coraza-crs:4.25.0-caddy-alpine-202604120304
    restart: unless-stopped
    command: >
      sh -c "echo 'SecAction \"id:900200,phase:1,pass,t:none,nolog,tag:'\''OWASP_CRS'\'',ver:'\''OWASP_CRS/4.25.0'\'',setvar:'\''tx.allowed_methods=GET HEAD POST OPTIONS PUT'\''\"' > /opt/coraza/rules.d/custom.conf && echo 'SecAction \"id:900220,phase:1,pass,t:none,nolog,tag:'\''OWASP_CRS'\'',ver:'\''OWASP_CRS/4.25.0'\'',setvar:'\''tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |multipart/related| |text/xml| |application/xml| |application/soap+xml| |application/json| |application/cloudevents+json| |application/cloudevents-batch+json| |application/grpc| |text/plain| |text/plain; charset=\\\"*\\\"|'\''\"' >> /opt/coraza/rules.d/custom.conf && echo '
      
        # Ensure Coraza WAF runs first - this must be included for Coraza to be working
        {
          order coraza_waf first
          log {
            output stdout
            format console
            level INFO
          }
        }
      
        :3000 {
      
          # Load Coraza configuration                          
          coraza_waf { 

            # Main configuration file                          
            include /opt/coraza/config/coraza.conf

            # User defined configuration files                 
            include /opt/coraza/config.d/*.conf
      
            # OWASP Core Rule Set (CRS) Setup                  
            include /opt/coraza/config/crs-setup.conf

            include /opt/coraza/owasp-crs/plugins/*-config.conf
            include /opt/coraza/owasp-crs/plugins/*-before.conf

            # User plugins Setup                               
            include /opt/coraza/plugins/*-config.conf
            include /opt/coraza/plugins/*-before.conf

            # OWASP Core Rule Set (CRS)                        
            include /opt/coraza/owasp-crs/rules/*.conf
      
            include /opt/coraza/owasp-crs/plugins/*-after.conf
      
            # User plugins after                               
            include /opt/coraza/plugins/*-after.conf           

            # Other baked in rule sets or configurations       
            include /opt/coraza/rules/*.conf          

            # User defined rule sets                           
            include /opt/coraza/rules.d/*.conf
      
            # Any overrides specified in env vars              
            include /opt/coraza/overrides/*.conf
          }
      
          handle_path /api/* {
            reverse_proxy http://ente-museum_ladral-caddy-1:8080
          }
      
          handle /s3-storage/* {
            reverse_proxy http://ente-museum_ladral-caddy-1:8080
          }
      
          reverse_proxy ente-web:3000
        }
      ' > /etc/caddy/Caddyfile && caddy run --config /etc/caddy/Caddyfile
      --adapter caddyfile"
    x-runtipi:
      internal_port: 3000
      is_main: true
  ente-web:
    image: ghcr.io/ente/web:latest
    restart: unless-stopped
    environment:
      - ENTE_PHOTOS_ORIGIN=https://${APP_EXPOSED_DOMAIN:-${APP_LOCAL_DOMAIN}}
      - ENTE_API_ORIGIN=https://${APP_EXPOSED_DOMAIN:-${APP_LOCAL_DOMAIN}}/api
